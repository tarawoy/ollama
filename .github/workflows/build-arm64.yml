name: Build Ollama Native OpenWrt (Static Musl)

on:
  workflow_dispatch: # Jalankan manual dari tab Actions

jobs:
  build-native:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Musl & ARM64 Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Static Binary
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 1
          CC: aarch64-linux-gnu-gcc
          CXX: aarch64-linux-gnu-g++
          # Menambahkan flag static agar semua library masuk ke dalam binary
          CGO_LDFLAGS: "-static"
        run: |
          go generate ./...
          go build -ldflags "-linkmode external -extldflags '-static'" -o ollama-openwrt-native .

      - name: Upload Native Binary
        uses: actions/upload-artifact@v4
        with:
          name: ollama-static-arm64
          path: ollama-openwrt-native
